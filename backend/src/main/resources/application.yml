server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/teaching_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT
jwt:
  secret: teaching-system-rag-cot-bmstu-2026-secret-key-for-jwt
  expiration: 86400000

# AI 微服务地址
ai-service:
  url: http://localhost:8000

# Knife4j API 文档
springdoc:
  swagger-ui:
    path: /doc.html
  api-docs:
    path: /v3/api-docs
